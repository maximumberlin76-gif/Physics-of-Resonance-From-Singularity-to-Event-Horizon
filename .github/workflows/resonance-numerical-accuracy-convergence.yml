name: Resonance Numerical Accuracy and Convergence

on:
  workflow_dispatch:

  push:
    branches:
      - main
    paths:
      - "**/*.py"
      - ".github/workflows/resonance-numerical-accuracy-convergence.yml"

  pull_request:
    branches:
      - main
    paths:
      - "**/*.py"
      - ".github/workflows/resonance-numerical-accuracy-convergence.yml"

permissions:
  contents: read

jobs:
  numerical-validation:
    name: Validate numerical accuracy and convergence
    runs-on: ubuntu-latest
    timeout-minutes: 20

    env:
      PYTHONPATH: ${{ github.workspace }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v7

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Install numerical dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install numpy
          python -m pip check

      - name: Compile numerical sources
        run: |
          python -m compileall -q \
            rpu_core \
            plot_twa_results.py

      - name: Validate analytical Bloch stationary states
        run: |
          python - <<'PY'
          import numpy as np

          from rpu_core.twa_demo.run_twa_demo import (
              bloch_rhs,
              steady_state_bloch,
          )


          cases = (
              (
                  1.0,
                  0.1,
                  0.0,
              ),
              (
                  1.0,
                  0.2,
                  0.35,
              ),
              (
                  2.0,
                  0.5,
                  -0.4,
              ),
          )

          for (
              Omega,
              gamma,
              delta,
          ) in cases:
              stationary = (
                  steady_state_bloch(
                      Omega,
                      gamma,
                      delta,
                  )
              )

              residual = bloch_rhs(
                  0.0,
                  stationary,
                  Omega,
                  gamma,
                  delta,
              )

              residual_norm = float(
                  np.linalg.norm(
                      residual
                  )
              )

              if not np.all(
                  np.isfinite(
                      stationary
                  )
              ):
                  raise RuntimeError(
                      "Non-finite analytical "
                      "stationary state."
                  )

              if residual_norm > 1.0e-12:
                  raise RuntimeError(
                      "Analytical stationary-state "
                      "residual exceeded tolerance: "
                      f"{residual_norm:.6e}"
                  )

              print(
                  f"Omega={Omega:g}, "
                  f"gamma={gamma:g}, "
                  f"delta={delta:g}, "
                  f"residual={residual_norm:.6e}"
              )

          print(
              "Analytical Bloch stationary-state "
              "validation: PASS"
          )
          PY

      - name: Validate fourth-order RK4 convergence
        run: |
          python - <<'PY'
          import numpy as np

          from rpu_core.twa_demo.run_twa_demo import (
              bloch_rhs,
              rk4_step,
          )


          Omega = 1.0
          gamma = 0.2
          delta = 0.35
          final_time = 4.0

          initial_state = np.array(
              [
                  0.2,
                  -0.1,
                  -0.9,
              ],
              dtype=float,
          )


          def integrate(
              dt,
          ):
              steps = int(
                  round(
                      final_time
                      / dt
                  )
              )

              if abs(
                  steps
                  * dt
                  - final_time
              ) > 1.0e-12:
                  raise RuntimeError(
                      "Integration grid does not "
                      "end at the requested time."
                  )

              state = (
                  initial_state.copy()
              )

              t = 0.0

              for _ in range(
                  steps
              ):
                  state = rk4_step(
                      bloch_rhs,
                      state,
                      t,
                      dt,
                      (
                          Omega,
                          gamma,
                          delta,
                      ),
                  )

                  t += dt

              return state


          state_0040 = integrate(
              0.040
          )

          state_0020 = integrate(
              0.020
          )

          state_0010 = integrate(
              0.010
          )

          state_0005 = integrate(
              0.005
          )

          error_12 = float(
              np.linalg.norm(
                  state_0040
                  - state_0020
              )
          )

          error_23 = float(
              np.linalg.norm(
                  state_0020
                  - state_0010
              )
          )

          error_34 = float(
              np.linalg.norm(
                  state_0010
                  - state_0005
              )
          )

          if not (
              error_12
              > error_23
              > error_34
              > 0.0
          ):
              raise RuntimeError(
                  "RK4 refinement errors "
                  "did not decrease monotonically: "
                  f"{error_12:.6e}, "
                  f"{error_23:.6e}, "
                  f"{error_34:.6e}"
              )

          order_12 = float(
              np.log2(
                  error_12
                  / error_23
              )
          )

          order_23 = float(
              np.log2(
                  error_23
                  / error_34
              )
          )

          if min(
              order_12,
              order_23,
          ) < 3.8:
              raise RuntimeError(
                  "Observed RK4 convergence order "
                  "fell below the required threshold: "
                  f"{order_12:.6f}, "
                  f"{order_23:.6f}"
              )

          print(
              f"Refinement errors: "
              f"{error_12:.6e}, "
              f"{error_23:.6e}, "
              f"{error_34:.6e}"
          )

          print(
              f"Observed convergence orders: "
              f"{order_12:.6f}, "
              f"{order_23:.6f}"
          )

          print(
              "Fourth-order RK4 convergence "
              "validation: PASS"
          )
          PY

      - name: Validate long-time Bloch convergence
        run: |
          python - <<'PY'
          import math

          import numpy as np

          from rpu_core.twa_demo.run_twa_demo import (
              bloch_rhs,
              rk4_step,
              steady_state_bloch,
          )


          Omega = 1.0
          delta = 0.0
          dt = 0.01

          final_time = (
              20.0
              * 2.0
              * math.pi
              / Omega
          )

          initial_state = np.array(
              [
                  0.0,
                  0.0,
                  -1.0,
              ],
              dtype=float,
          )

          errors = []

          for gamma_ratio in (
              0.1,
              0.2,
              0.5,
              1.0,
          ):
              gamma = (
                  gamma_ratio
                  * Omega
              )

              state = (
                  initial_state.copy()
              )

              t = 0.0

              while (
                  t
                  < final_time
                  - 1.0e-15
              ):
                  step = min(
                      dt,
                      final_time
                      - t,
                  )

                  state = rk4_step(
                      bloch_rhs,
                      state,
                      t,
                      step,
                      (
                          Omega,
                          gamma,
                          delta,
                      ),
                  )

                  t += step

              stationary = (
                  steady_state_bloch(
                      Omega,
                      gamma,
                      delta,
                  )
              )

              error = float(
                  np.linalg.norm(
                      state
                      - stationary
                  )
              )

              errors.append(
                  error
              )

              print(
                  f"gamma/Omega="
                  f"{gamma_ratio:g}, "
                  f"stationary_error_l2="
                  f"{error:.6e}"
              )

          maximum_error = max(
              errors
          )

          if maximum_error > 2.0e-4:
              raise RuntimeError(
                  "Long-time Bloch trajectory "
                  "did not converge sufficiently "
                  "toward the analytical "
                  "stationary state: "
                  f"{maximum_error:.6e}"
              )

          print(
              "Long-time Bloch convergence "
              "validation: PASS"
          )
          PY

      - name: Validate RPU timestep refinement
        run: |
          python - <<'PY'
          import numpy as np

          from rpu_core import RPUCore


          num_nodes = 24
          final_time = 0.5

          frequency_profile = (
              np.linspace(
                  0.8,
                  1.2,
                  num_nodes,
              )
              * 2.0
              * np.pi
          )

          amplitude_profile = np.linspace(
              0.1,
              0.4,
              num_nodes,
          )


          def integrate(
              dt,
          ):
              core = RPUCore(
                  num_nodes,
                  seed=76,
                  dt=dt,
                  sigma=0.0,
                  ternary=False,
                  anti_R=2.0,
                  k_global=0.4,
              )

              core.lock(
                  freq_profile=(
                      frequency_profile
                  ),
                  amp_profile=(
                      amplitude_profile
                  ),
                  reset_phase=True,
              )

              steps = int(
                  round(
                      final_time
                      / dt
                  )
              )

              if abs(
                  steps
                  * dt
                  - final_time
              ) > 1.0e-12:
                  raise RuntimeError(
                      "RPU refinement grid "
                      "does not end at the "
                      "requested time."
                  )

              core.step(
                  steps,
                  stability_guard=False,
              )

              if abs(
                  core.t
                  - final_time
              ) > 1.0e-12:
                  raise RuntimeError(
                      "RPU final integration "
                      "time mismatch."
                  )

              return (
                  core.theta.copy()
              )


          theta_0020 = integrate(
              0.020
          )

          theta_0010 = integrate(
              0.010
          )

          theta_0005 = integrate(
              0.005
          )

          theta_00025 = integrate(
              0.0025
          )


          def phase_error(
              first,
              second,
          ):
              return float(
                  np.linalg.norm(
                      np.exp(
                          1j
                          * first
                      )
                      - np.exp(
                          1j
                          * second
                      )
                  )
                  / np.sqrt(
                      first.size
                  )
              )


          error_12 = phase_error(
              theta_0020,
              theta_0010,
          )

          error_23 = phase_error(
              theta_0010,
              theta_0005,
          )

          error_34 = phase_error(
              theta_0005,
              theta_00025,
          )

          if not (
              error_12
              > error_23
              > error_34
              > 0.0
          ):
              raise RuntimeError(
                  "RPU timestep-refinement "
                  "errors did not decrease "
                  "monotonically: "
                  f"{error_12:.6e}, "
                  f"{error_23:.6e}, "
                  f"{error_34:.6e}"
              )

          order_12 = float(
              np.log2(
                  error_12
                  / error_23
              )
          )

          order_23 = float(
              np.log2(
                  error_23
                  / error_34
              )
          )

          if min(
              order_12,
              order_23,
          ) < 0.8:
              raise RuntimeError(
                  "Observed RPU refinement "
                  "convergence fell below "
                  "the required threshold: "
                  f"{order_12:.6f}, "
                  f"{order_23:.6f}"
              )

          print(
              f"RPU refinement errors: "
              f"{error_12:.6e}, "
              f"{error_23:.6e}, "
              f"{error_34:.6e}"
          )

          print(
              f"Observed RPU refinement orders: "
              f"{order_12:.6f}, "
              f"{order_23:.6f}"
          )

          print(
              "RPU timestep-refinement "
              "validation: PASS"
          )
          PY

      - name: Validate CSV numerical fidelity and refinement
        run: |
          python - <<'PY'
          import csv
          import tempfile
          from pathlib import Path

          import numpy as np

          from rpu_core.twa_demo.run_twa_demo import (
              Params,
              run,
          )


          Omega = 1.0
          gamma = 0.2
          delta = 0.35
          final_time = 4.0

          initial_state = np.array(
              [
                  0.2,
                  -0.1,
                  -0.9,
              ],
              dtype=float,
          )

          final_states = []

          with tempfile.TemporaryDirectory() as tmp:
              temporary_directory = Path(
                  tmp
              )

              for dt in (
                  0.020,
                  0.010,
                  0.005,
              ):
                  output_path = (
                      temporary_directory
                      / (
                          "trajectory_"
                          f"{dt:.3f}.csv"
                      )
                  )

                  result = run(
                      Params(
                          Omega=Omega,
                          gamma=gamma,
                          delta=delta,
                          T=final_time,
                          dt=dt,
                          s0=initial_state,
                      ),
                      output_path,
                  )

                  with output_path.open(
                      "r",
                      encoding="utf-8",
                      newline="",
                  ) as handle:
                      rows = list(
                          csv.DictReader(
                              handle
                          )
                      )

                  if len(
                      rows
                  ) != result[
                      "rows"
                  ]:
                      raise RuntimeError(
                          "CSV row count does not "
                          "match integration result."
                      )

                  final_row = rows[
                      -1
                  ]

                  final_state = np.array(
                      [
                          float(
                              final_row[
                                  column
                              ]
                          )
                          for column in (
                              "sx",
                              "sy",
                              "sz",
                          )
                      ],
                      dtype=float,
                  )

                  np.testing.assert_allclose(
                      final_state,
                      result[
                          "final_state"
                      ],
                      rtol=0.0,
                      atol=2.0e-16,
                  )

                  final_states.append(
                      final_state
                  )

          error_coarse_medium = float(
              np.linalg.norm(
                  final_states[
                      0
                  ]
                  - final_states[
                      1
                  ]
              )
          )

          error_medium_fine = float(
              np.linalg.norm(
                  final_states[
                      1
                  ]
                  - final_states[
                      2
                  ]
              )
          )

          if not (
              error_coarse_medium
              > error_medium_fine
              > 0.0
          ):
              raise RuntimeError(
                  "CSV trajectory refinement "
                  "errors did not decrease: "
                  f"{error_coarse_medium:.6e}, "
                  f"{error_medium_fine:.6e}"
              )

          refinement_ratio = (
              error_coarse_medium
              / error_medium_fine
          )

          if refinement_ratio < 12.0:
              raise RuntimeError(
                  "CSV trajectory refinement "
                  "ratio fell below the "
                  "required RK4 threshold: "
                  f"{refinement_ratio:.6f}"
              )

          print(
              f"CSV refinement errors: "
              f"{error_coarse_medium:.6e}, "
              f"{error_medium_fine:.6e}"
          )

          print(
              f"CSV refinement ratio: "
              f"{refinement_ratio:.6f}"
          )

          print(
              "CSV numerical fidelity and "
              "refinement validation: PASS"
          )
          PY

      - name: Verify repository integrity
        run: |
          if [ -n "$(git status --porcelain)" ]; then
            git status --short
            echo "Repository was modified during numerical validation."
            exit 1
          fi

          echo "Repository integrity validation: PASS"

      - name: Report numerical validation result
        run: |
          echo "Resonance numerical accuracy and convergence validation: PASS"
